services:
  postgres:
    image: postgres:16
    container_name: vaiha-postgres
    environment:
      POSTGRES_USER: vaiha
      POSTGRES_PASSWORD: vaiha
      POSTGRES_DB: vaiha
    ports:
      - "5432:5432"
    volumes:
      - vaiha_postgres_data:/var/lib/postgresql/data

volumes:
  vaiha_postgres_data:
